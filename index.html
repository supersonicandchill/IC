<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>In Charge Checklist</title>

<style>
    body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        background: #111;
        color: #fff;
        display: flex;
        justify-content: center;
        padding: 20px;
    }

    .app {
        width: 100%;
        max-width: 500px;
    }

    h1 {
        text-align: center;
        font-weight: 600;
        margin-bottom: 20px;
    }

    .input-row {
        display: flex;
        gap: 10px;
        margin-bottom: 20px;
    }

    input {
        flex: 1;
        padding: 12px;
        border-radius: 10px;
        border: none;
        font-size: 16px;
    }

    button {
        padding: 12px 16px;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        background: #333;
        color: #fff;
    }

    ul {
        list-style: none;
        padding: 0;
        margin: 0;
    }

    li {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 14px;
        border-radius: 12px;
        margin-bottom: 10px;
        background: #621f1f; /* red-ish for NOT done */
        transition: 0.2s ease;
    }

    li.done {
        background: #1e4d2b; /* green when done */
    }

    .task-text {
        flex: 1;
        margin-left: 10px;
    }

    .task-text.done {
        text-decoration: line-through;
        opacity: 0.7;
    }

    .checkbox {
        width: 20px;
        height: 20px;
        border-radius: 6px;
        background: #000;
        border: 2px solid #fff;
        cursor: pointer;
    }

    .checkbox.done {
        background: #22bb55;
        border-color: #22bb55;
    }

    .delete-btn {
        margin-left: 12px;
        font-size: 14px;
        cursor: pointer;
        opacity: 0.6;
    }
</style>
</head>

<body>
<div class="app">
    <h1>In Charge Checklist</h1>

    <div class="input-row">
        <input id="newTask" placeholder="Add new item..." />
        <button onclick="addTask()">Add</button>
    </div>

    <ul id="taskList"></ul>
</div>

<script>
const defaultTasks = [
    "Check checks",
    "Tasks",
    "Tools w/ Jazz",
    "Timesheets",
    "Right Stuff",
    "Quick Drill",
    "RPD",
    "Rostering",
    "Staffing update"
];

function loadTasks() {
    const saved = JSON.parse(localStorage.getItem("inChargeChecklist"));
    let tasks = saved ?? defaultTasks.map(t => ({ text: t, done: false }));
    render(tasks);
}

function saveTasks(tasks) {
    localStorage.setItem("inChargeChecklist", JSON.stringify(tasks));
}

function render(tasks) {
    const list = document.getElementById("taskList");
    list.innerHTML = "";

    tasks.forEach((task, i) => {
        const li = document.createElement("li");
        if (task.done) li.classList.add("done");

        const cb = document.createElement("div");
        cb.className = "checkbox" + (task.done ? " done" : "");
        cb.onclick = () => toggle(i);

        const text = document.createElement("div");
        text.className = "task-text" + (task.done ? " done" : "");
        text.textContent = task.text;

        const del = document.createElement("div");
        del.className = "delete-btn";
        del.textContent = "✖";
        del.onclick = () => removeTask(i);

        li.appendChild(cb);
        li.appendChild(text);
        li.appendChild(del);
        list.appendChild(li);
    });

    saveTasks(tasks);
}

function addTask() {
    const input = document.getElementById("newTask");
    const text = input.value.trim();
    if (!text) return;
    const tasks = JSON.parse(localStorage.getItem("inChargeChecklist")) || [];
    tasks.push({ text, done: false });
    input.value = "";
    render(tasks);
}

function toggle(i) {
    const tasks = JSON.parse(localStorage.getItem("inChargeChecklist"));
    tasks[i].done = !tasks[i].done;
    render(tasks);
}

function removeTask(i) {
    const tasks = JSON.parse(localStorage.getItem("inChargeChecklist"));
    tasks.splice(i, 1);
    render(tasks);
}

loadTasks();
</script>

</body>
</html>
