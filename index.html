
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>In Charge</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
  :root {
    --bg: #0d0e10;
    --surface: #16181c;
    --surface2: #1e2128;
    --border: #2a2d35;
    --red: #e03030;
    --red-dim: #7a1a1a;
    --green: #22b45a;
    --green-dim: #0e3d22;
    --text: #e8e8e8;
    --muted: #666;
    --accent: #ff4040;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px 60px;
  }

  /* ─── HEADER ─── */
  .header {
    width: 100%;
    max-width: 480px;
    margin-bottom: 28px;
    position: relative;
  }

  .header-top {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    margin-bottom: 6px;
  }

  h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 52px;
    letter-spacing: 3px;
    line-height: 1;
    color: var(--text);
  }

  h1 span {
    color: var(--accent);
  }

  .date-badge {
    font-size: 10px;
    letter-spacing: 1.5px;
    color: var(--muted);
    text-transform: uppercase;
    padding-bottom: 4px;
  }

  .progress-bar-wrap {
    width: 100%;
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
    margin-bottom: 4px;
  }

  .progress-bar-fill {
    height: 100%;
    background: var(--green);
    border-radius: 2px;
    transition: width 0.4s ease;
    width: 0%;
  }

  .progress-label {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  /* ─── ADD ROW ─── */
  .add-row {
    display: flex;
    gap: 8px;
    width: 100%;
    max-width: 480px;
    margin-bottom: 20px;
  }

  .add-row input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 13px 16px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }

  .add-row input::placeholder { color: var(--muted); }
  .add-row input:focus { border-color: var(--accent); }

  .add-btn {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 13px 20px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: 1px;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
  }

  .add-btn:active { transform: scale(0.95); background: #c02020; }

  /* ─── TASK LIST ─── */
  .task-list {
    width: 100%;
    max-width: 480px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .task-item {
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 4px solid var(--red);
    border-radius: 10px;
    padding: 14px 14px;
    cursor: pointer;
    transition: border-color 0.25s, background 0.25s, opacity 0.2s;
    animation: slideIn 0.2s ease both;
    position: relative;
    -webkit-tap-highlight-color: transparent;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .task-item.done {
    border-left-color: var(--green);
    background: var(--surface2);
    opacity: 0.72;
  }

  /* Custom checkbox */
  .check-ring {
    width: 24px;
    height: 24px;
    border-radius: 6px;
    border: 2px solid var(--muted);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: border-color 0.2s, background 0.2s;
    position: relative;
  }

  .task-item.done .check-ring {
    border-color: var(--green);
    background: var(--green);
  }

  .check-ring svg {
    opacity: 0;
    transform: scale(0.5);
    transition: opacity 0.2s, transform 0.2s;
  }

  .task-item.done .check-ring svg {
    opacity: 1;
    transform: scale(1);
  }

  .task-text {
    flex: 1;
    font-size: 15px;
    letter-spacing: 0.3px;
    line-height: 1.3;
    transition: color 0.2s;
  }

  .task-item.done .task-text {
    text-decoration: line-through;
    color: var(--muted);
  }

  .del-btn {
    background: none;
    border: none;
    color: var(--border);
    font-size: 18px;
    cursor: pointer;
    padding: 4px 6px;
    line-height: 1;
    border-radius: 6px;
    transition: color 0.15s, background 0.15s;
    flex-shrink: 0;
  }

  .del-btn:hover { color: var(--accent); background: rgba(224,48,48,0.1); }

  /* ─── RESET ─── */
  .footer-row {
    width: 100%;
    max-width: 480px;
    margin-top: 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .stat-text {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .reset-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 8px 14px;
    border-radius: 6px;
    cursor: pointer;
    transition: color 0.2s, border-color 0.2s;
  }

  .reset-btn:hover { color: var(--accent); border-color: var(--accent); }

  /* ─── ALL CLEAR STATE ─── */
  .all-clear {
    display: none;
    text-align: center;
    padding: 30px 0 10px;
  }

  .all-clear.show { display: block; }

  .all-clear-icon {
    font-size: 40px;
    margin-bottom: 8px;
  }

  .all-clear-text {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    color: var(--green);
    letter-spacing: 3px;
  }

  .all-clear-sub {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-top: 4px;
  }

  /* drag handle (mobile long press alternative: just reorder by tap) */
  @media (hover: hover) {
    .task-item:hover { border-color: var(--surface2); }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <h1>IN <span>CHARGE</span></h1>
    <div class="date-badge" id="dateBadge"></div>
  </div>
  <div class="progress-bar-wrap">
    <div class="progress-bar-fill" id="progressFill"></div>
  </div>
  <div class="progress-label" id="progressLabel">0 of 0 complete</div>
</div>

<div class="add-row">
  <input id="newTask" placeholder="Add item..." />
  <button class="add-btn" onclick="addTask()">+ ADD</button>
</div>

<ul class="task-list" id="taskList"></ul>

<div class="all-clear" id="allClear">
  <div class="all-clear-icon">🔥</div>
  <div class="all-clear-text">All Clear</div>
  <div class="all-clear-sub">Station ready. Good work, Lt.</div>
</div>

<div class="footer-row">
  <div class="stat-text" id="statText"></div>
  <button class="reset-btn" onclick="resetChecks()">↺ Reset Checks</button>
</div>

<script>
const DEFAULT_TASKS = [
  "Check checks",
  "Tasks",
  "Tools w/ Jazz",
  "Timesheets",
  "Right Stuff",
  "Quick Drill",
  "RPD",
  "Rostering",
  "Staffing update"
];

const KEY = "inChargeChecklist_v2";

function load() {
  const saved = JSON.parse(localStorage.getItem(KEY));
  return saved ?? DEFAULT_TASKS.map(t => ({ text: t, done: false }));
}

function save(tasks) {
  localStorage.setItem(KEY, JSON.stringify(tasks));
}

function render() {
  const tasks = load();
  const list = document.getElementById("taskList");
  list.innerHTML = "";

  const done = tasks.filter(t => t.done).length;
  const total = tasks.length;
  const pct = total ? Math.round((done / total) * 100) : 0;

  document.getElementById("progressFill").style.width = pct + "%";
  document.getElementById("progressLabel").textContent = `${done} of ${total} complete`;
  document.getElementById("statText").textContent = total ? `${pct}% done` : "";

  const allClear = document.getElementById("allClear");
  allClear.classList.toggle("show", total > 0 && done === total);

  tasks.forEach((task, i) => {
    const li = document.createElement("li");
    li.className = "task-item" + (task.done ? " done" : "");

    // checkbox
    const ring = document.createElement("div");
    ring.className = "check-ring";
    ring.innerHTML = `<svg width="13" height="10" viewBox="0 0 13 10" fill="none">
      <path d="M1.5 5L5 8.5L11.5 1.5" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>`;

    // text
    const txt = document.createElement("div");
    txt.className = "task-text";
    txt.textContent = task.text;

    // delete
    const del = document.createElement("button");
    del.className = "del-btn";
    del.innerHTML = "×";
    del.title = "Remove";
    del.onclick = (e) => { e.stopPropagation(); removeTask(i); };

    li.onclick = () => toggle(i);
    li.appendChild(ring);
    li.appendChild(txt);
    li.appendChild(del);
    list.appendChild(li);
  });
}

function toggle(i) {
  const tasks = load();
  tasks[i].done = !tasks[i].done;
  save(tasks);
  render();
}

function removeTask(i) {
  const tasks = load();
  tasks.splice(i, 1);
  save(tasks);
  render();
}

function addTask() {
  const input = document.getElementById("newTask");
  const text = input.value.trim();
  if (!text) return;
  const tasks = load();
  tasks.push({ text, done: false });
  save(tasks);
  input.value = "";
  render();
}

function resetChecks() {
  const tasks = load().map(t => ({ ...t, done: false }));
  save(tasks);
  render();
}

// Date badge
(function() {
  const d = new Date();
  const days = ["SUN","MON","TUE","WED","THU","FRI","SAT"];
  const months = ["JAN","FEB","MAR","APR","MAY","JUN","JUL","AUG","SEP","OCT","NOV","DEC"];
  document.getElementById("dateBadge").textContent =
    `${days[d.getDay()]} ${months[d.getMonth()]} ${d.getDate()}`;
})();

// Enter key
document.getElementById("newTask").addEventListener("keydown", e => {
  if (e.key === "Enter") addTask();
});

render();
</script>
</body>
</html>
